[include mainsail.cfg]
[exclude_object]
#[mcu host]
#[mcu]
#serial: /tmp/klipper_host_mcu

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 0
max_temp: 100

# This file contains common pin mappings for the Fysetc Cheetah v2.0
# board. To use this config, the firmware should be compiled for the
# STM32F401 with "No bootloader" and Communication interface USB

# After running "make", run the following command to flash the board:
# dfu-util -R -a 0 -s 0x08000000:leave -D out/klipper.bin

# See docs/Config_Reference.md for a description of parameters.

[mcu]
canbus_uuid: 53e624039aa0
#####################################################################
#	Obtain mcu value by "ls -l /dev/serial/by-id/" 
#####################################################################

[printer]
kinematics: corexy
max_velocity: 500
max_accel: 20000
max_z_velocity: 15
max_z_accel: 45
square_corner_velocity: 6.0

#####################################################################
#      X/Y Stepper Settings
#####################################################################

[stepper_x]
step_pin: PE0
## Refer to https://docs.vorondesign.com/build/startup/#v0
dir_pin: PD1
enable_pin: !PD3
rotation_distance: 40
microsteps: 32
#endstop_pin: ^PB4   #use SHTv2 endstop pin
full_steps_per_rotation: 200                 # Set to 400 for 0.9°„ degree stepper motor, 200 is for 1.8°„ stepper motors
position_min: 0                     # 软限位最小行程
position_endstop: 120
position_max: 120
homing_speed: 50 #100                             # Increase after initial setup, Max 100
homing_retract_dist: 3
second_homing_speed: 5.0
homing_positive_dir: true

[tmc2240 stepper_x] 
cs_pin: PD0
spi_bus: spi3
run_current: 0.7                   # 电机运行电流值
interpolate: False                  # 是否开启256微步插值（不建议开启）
rref: 12300
stealthchop_threshold: 0           # 静音阀值（如果不需要静音，请将数值改为0）
#[tmc2209 stepper_x]
#uart_pin: PA3
#tx_pin: PA2
#uart_address: 0
#interpolate: False
#run_current: 0.7
#sense_resistor: 0.110
#stealthchop_threshold: 0           # Set to 999999 to turn stealthchop on, and 0 to use spreadcycle

[stepper_y]
step_pin: PE2
## Refer to https://docs.vorondesign.com/build/startup/#v0
dir_pin: PD5
enable_pin: !PD6
rotation_distance: 40
microsteps: 32
endstop_pin: ^PE8
position_min: 0                     # 软限位最小行程
position_endstop: 120
position_max: 120
homing_speed: 50                              # Can be increased after initial setup, Max 100
homing_retract_dist: 5
homing_positive_dir: true

[tmc2240 stepper_y] 
cs_pin: PD4
spi_bus: spi3
run_current: 0.7                   # 电机运行电流值
interpolate: False                  # 是否开启256微步插值（不建议开启）
rref: 12300
stealthchop_threshold: 0           # 静音阀值（如果不需要静音，请将数值改为0）
#[tmc2209 stepper_y]
#uart_pin: PA3
#tx_pin: PA2
#uart_address: 2
#interpolate: False
#run_current: 0.7                            # For V0.1 spec NEMA14 40Ncm
#sense_resistor: 0.110
#stealthchop_threshold: 0 #250             # Set to 999999 to turn stealthchop on, and 0 to use spreadcycle

#####################################################################
#   Z Stepper Settings
#####################################################################

[stepper_z]
step_pin: PE4
dir_pin: !PC13	# Remove ! if moving opposite direction
enable_pin: !PC14
rotation_distance: 8 #for T8x8 lead screw
#rotation_distance: 2 #for T8x2 lead screw
microsteps: 32
endstop_pin: ^PE9
#position_endstop: -.10
position_min: -5             # 配置喷嘴清洁需要-5左右
#position_endstop: 120         # 软限位最大行程 (250mm-300mm-350mm)（voron0.1是120）
position_max: 120
homing_speed: 10   #Max 100
second_homing_speed: 3.0
homing_retract_dist: 3.0

[tmc2209 stepper_z]
uart_pin: PB6
#tx_pin: PA2
#uart_address: 1
interpolate: False
run_current: 0.3                             # For V0.1 spec NEMA17 w/ integrated lead screw
sense_resistor: 0.110
stealthchop_threshold: 0                     # Set to 999999 to turn stealthchop on, and 0 to use spreadcycle

