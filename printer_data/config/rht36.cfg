## RHT36设置
[mcu rht36]
serial:  /dev/serial/by-id/usb-Klipper_rp2040_E66138935F408629-if00

## RHT36温度
[temperature_sensor FLY-RHT36]
sensor_type: temperature_mcu
sensor_mcu: rht36

## FAN0
[heater_fan hotend_fan]
pin: rht36:gpio25
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0
#fan_speed: 1.0

## FAN1
[fan]
pin: rht36:gpio24
max_power: 1.0
kick_start_time: 0.5
cycle_time: 0.009
#off_below: 0.10

## X限位设置
[stepper_x]
endstop_pin: rht36:gpio19
## RHT板有gpio18,gpio19两个限位引脚可用，按照实际接线修改配置
## gpio18引脚默认支持高压输入，可用于12/24v的接近传感器等。可通过跳线帽配置gpio18为普通限位引脚

