## ADXL345加速度计
[adxl345]
cs_pin: rht36:gpio6
spi_software_sclk_pin: rht36:gpio2
spi_software_mosi_pin: rht36:gpio3
spi_software_miso_pin: rht36:gpio4

[resonance_tester]
accel_chip: adxl345
probe_points:
    60, 60, 20  # an example

